name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-binaries:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
            arch: x64
            target: node20-linux-x64
            archive_ext: tar.gz
          - os: macos-latest
            platform: macos
            arch: x64
            target: node20-macos-x64
            archive_ext: tar.gz
          - os: macos-latest
            platform: macos
            arch: arm64
            target: node20-macos-arm64
            archive_ext: tar.gz
          - os: windows-latest
            platform: windows
            arch: x64
            target: node20-win-x64
            archive_ext: zip
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build

      - name: Resolve version
        id: version
        shell: bash
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            version="${GITHUB_REF_NAME#v}"
          else
            version="$(node -p "require('./package.json').version")"
          fi
          echo "value=${version}" >> "$GITHUB_OUTPUT"

      - name: Build binary (unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          out_name="clawsync"
          npm exec --yes --package @yao-pkg/pkg -- pkg dist/cli.js --target "${{ matrix.target }}" --output "$out_name"
          archive_versioned="clawsync-${{ steps.version.outputs.value }}-${{ matrix.platform }}-${{ matrix.arch }}.tar.gz"
          archive_latest="clawsync-latest-${{ matrix.platform }}-${{ matrix.arch }}.tar.gz"
          tar -czf "$archive_versioned" "$out_name"
          cp "$archive_versioned" "$archive_latest"

      - name: Build binary (windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $outName = "clawsync.exe"
          npm exec --yes --package @yao-pkg/pkg -- pkg dist/cli.js --target "${{ matrix.target }}" --output $outName
          $archiveVersioned = "clawsync-${{ steps.version.outputs.value }}-${{ matrix.platform }}-${{ matrix.arch }}.zip"
          $archiveLatest = "clawsync-latest-${{ matrix.platform }}-${{ matrix.arch }}.zip"
          Compress-Archive -Path $outName -DestinationPath $archiveVersioned
          Copy-Item -Path $archiveVersioned -Destination $archiveLatest

      - name: Upload archive artifact
        uses: actions/upload-artifact@v4
        with:
          name: clawsync-${{ matrix.platform }}-${{ matrix.arch }}
          path: |
            clawsync-${{ steps.version.outputs.value }}-${{ matrix.platform }}-${{ matrix.arch }}.tar.gz
            clawsync-latest-${{ matrix.platform }}-${{ matrix.arch }}.tar.gz
            clawsync-${{ steps.version.outputs.value }}-${{ matrix.platform }}-${{ matrix.arch }}.zip
            clawsync-latest-${{ matrix.platform }}-${{ matrix.arch }}.zip
          if-no-files-found: ignore

  publish-release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build-binaries
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            release-assets/**/*.tar.gz
            release-assets/**/*.zip
            scripts/install.sh
